<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ホテル収益シミュレーター</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏨</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif; background: #0f172a; color: #e2e8f0; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #1e293b; }
  ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #64748b; }
  input[type="number"] { -moz-appearance: textfield; }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  select, input, button { font-family: inherit; }
  @media print {
    body { background: #fff !important; color: #000 !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useCallback, useEffect, Fragment } = React;

// ── Utility functions ──
const isLeapYear = (y) => (y % 4 === 0 && y % 100 !== 0) || y % 400 === 0;
const daysInYear = (y) => (isLeapYear(y) ? 366 : 365);

function getJapaneseHolidays(year) {
  const holidays = new Set();
  const add = (m, d) => holidays.add(`${year}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`);
  add(1,1);
  { let d = new Date(year,0,1); while(d.getDay()!==1) d.setDate(d.getDate()+1); d.setDate(d.getDate()+7); add(1,d.getDate()); }
  add(2,11); add(2,23);
  add(3, year <= 2099 ? Math.floor(20.8431 + 0.242194*(year-1980) - Math.floor((year-1980)/4)) : 21);
  add(4,29); add(5,3); add(5,4); add(5,5);
  { let d = new Date(year,6,1); while(d.getDay()!==1) d.setDate(d.getDate()+1); d.setDate(d.getDate()+14); add(7,d.getDate()); }
  add(8,11);
  { let d = new Date(year,8,1); while(d.getDay()!==1) d.setDate(d.getDate()+1); d.setDate(d.getDate()+14); add(9,d.getDate()); }
  add(9, year <= 2099 ? Math.floor(23.2488 + 0.242194*(year-1980) - Math.floor((year-1980)/4)) : 23);
  { let d = new Date(year,9,1); while(d.getDay()!==1) d.setDate(d.getDate()+1); d.setDate(d.getDate()+7); add(10,d.getDate()); }
  add(11,3); add(11,23);
  const holidayList = [...holidays].sort();
  for (const h of holidayList) {
    const dt = new Date(h + "T00:00:00");
    if (dt.getDay() === 0) {
      let next = new Date(dt); next.setDate(next.getDate()+1);
      const ns = `${next.getFullYear()}-${String(next.getMonth()+1).padStart(2,"0")}-${String(next.getDate()).padStart(2,"0")}`;
      holidays.add(ns);
    }
  }
  return holidays;
}

function generateDays(year) {
  const holidays = getJapaneseHolidays(year);
  const days = [];
  const n = daysInYear(year);
  for (let i = 0; i < n; i++) {
    const dt = new Date(year, 0, 1 + i);
    const m = dt.getMonth() + 1;
    const d = dt.getDate();
    const dow = dt.getDay();
    const key = `${year}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const isHoliday = holidays.has(key);
    const isSat = dow === 6;
    const isSun = dow === 0;
    const nextDt = new Date(dt); nextDt.setDate(nextDt.getDate()+1);
    const nextKey = `${nextDt.getFullYear()}-${String(nextDt.getMonth()+1).padStart(2,"0")}-${String(nextDt.getDate()).padStart(2,"0")}`;
    const isBeforeHoliday = dow === 5 || dow === 6 || holidays.has(nextKey);
    days.push({ index: i, date: dt, month: m, day: d, dow, key, isHoliday, isSat, isSun, isBeforeHoliday,
      label: `${m}/${d}`, dowLabel: ["日","月","火","水","木","金","土"][dow] });
  }
  return days;
}

const DEMAND_COLORS = { 5: "#dc2626", 4: "#f59e0b", 3: "#22c55e", 2: "#3b82f6", 1: "#94a3b8", 0: "#1e293b" };
const DEMAND_LABELS = { 5: "最高", 4: "高", 3: "中", 2: "低", 1: "最低", 0: "休館" };

const DEFAULT_ROOM_TYPES = [
  { id: "single", name: "シングル", area: 15, prices: {5:12000,4:10000,3:8000,2:6500,1:5000}, occ: {5:95,4:85,3:70,2:50,1:30}, rooms: 20 },
  { id: "double", name: "ダブル", area: 18, prices: {5:16000,4:13000,3:10000,2:8000,1:6000}, occ: {5:98,4:90,3:75,2:55,1:35}, rooms: 30 },
  { id: "twin", name: "ツイン", area: 28, prices: {5:22000,4:18000,3:14000,2:11000,1:8000}, occ: {5:98,4:92,3:78,2:55,1:30}, rooms: 15 },
  { id: "deluxe", name: "デラックスツイン", area: 38, prices: {5:35000,4:28000,3:22000,2:17000,1:12000}, occ: {5:95,4:85,3:65,2:40,1:20}, rooms: 8 },
  { id: "suite", name: "スイート", area: 55, prices: {5:55000,4:45000,3:35000,2:25000,1:18000}, occ: {5:90,4:75,3:55,2:30,1:15}, rooms: 2 },
];

const fmt = (n) => n.toLocaleString("ja-JP");
const fmtYen = (n) => "¥" + fmt(Math.round(n));

const TABS = ["マスター設定", "需要カレンダー", "売上シミュレーション", "ルームミックス最適化"];

function App() {
  const [tab, setTab] = useState(0);
  const [year, setYear] = useState(2027);
  const [roomTypes, setRoomTypes] = useState(DEFAULT_ROOM_TYPES);
  const [totalArea, setTotalArea] = useState(2000);
  const days = useMemo(() => generateDays(year), [year]);
  const [demandMap, setDemandMap] = useState({});

  useEffect(() => {
    const m = {};
    const d = generateDays(year);
    d.forEach((day) => {
      m[day.index] = {};
      roomTypes.forEach((rt) => {
        let demand = 2;
        if (day.isHoliday || day.isSun) demand = 4;
        if (day.isSat || day.isBeforeHoliday) demand = 4;
        if (day.dow >= 1 && day.dow <= 4 && !day.isHoliday) demand = 2;
        if (day.dow === 5 && !day.isHoliday) demand = 3;
        if ((day.month===4 && day.day>=28)||(day.month===5 && day.day<=5)) demand = 5;
        if (day.month===8 && day.day>=10 && day.day<=16) demand = 5;
        if (day.month===12 && day.day>=28 || (day.month===1 && day.day<=3)) demand = 5;
        m[day.index][rt.id] = demand;
      });
    });
    setDemandMap(m);
  }, [year, roomTypes.length]);

  const setDemand = useCallback((dayIdx, rtId, val) => {
    setDemandMap(prev => ({...prev, [dayIdx]: {...(prev[dayIdx]||{}), [rtId]: val}}));
  }, []);

  const setMonthDemand = useCallback((month, rtId, val) => {
    setDemandMap(prev => {
      const next = {...prev};
      days.forEach(d => { if(d.month === month) { next[d.index] = {...(next[d.index]||{}), [rtId]: val}; }});
      return next;
    });
  }, [days]);

  const dailyRevenue = useMemo(() => {
    return days.map(day => {
      let total = 0, totalRoomsAll = 0, soldRoomsAll = 0;
      const details = {};
      roomTypes.forEach(rt => {
        const demand = demandMap[day.index]?.[rt.id] ?? 2;
        if (demand === 0) { details[rt.id] = { revenue: 0, rooms: 0, price: 0, occ: 0, totalRooms: rt.rooms }; totalRoomsAll += rt.rooms; return; }
        const price = rt.prices[demand] || 0;
        const occ = (rt.occ[demand] || 0) / 100;
        const soldRooms = Math.round(rt.rooms * occ * 10) / 10;
        const rev = soldRooms * price;
        total += rev; totalRoomsAll += rt.rooms; soldRoomsAll += soldRooms;
        details[rt.id] = { revenue: rev, rooms: soldRooms, price, occ: occ*100, totalRooms: rt.rooms };
      });
      const occAll = totalRoomsAll > 0 ? (soldRoomsAll / totalRoomsAll) * 100 : 0;
      const adr = soldRoomsAll > 0 ? total / soldRoomsAll : 0;
      return { total, details, occAll, adr, soldRoomsAll, totalRoomsAll };
    });
  }, [days, roomTypes, demandMap]);

  const annualRevenue = useMemo(() => dailyRevenue.reduce((s, d) => s + d.total, 0), [dailyRevenue]);
  const monthlyRevenue = useMemo(() => {
    const mr = Array(12).fill(0);
    days.forEach((d, i) => { mr[d.month - 1] += dailyRevenue[i].total; });
    return mr;
  }, [days, dailyRevenue]);

  // JSON export/import
  const exportData = () => {
    const data = { year, roomTypes, totalArea, demandMap };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = `hotel_sim_${year}.json`; a.click();
    URL.revokeObjectURL(url);
  };

  const importData = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.year) setYear(data.year);
        if (data.roomTypes) setRoomTypes(data.roomTypes);
        if (data.totalArea) setTotalArea(data.totalArea);
        if (data.demandMap) setDemandMap(data.demandMap);
        alert("データを読み込みました");
      } catch { alert("ファイルの読み込みに失敗しました"); }
    };
    reader.readAsText(file);
  };

  return (
    <div style={{fontFamily:"'Noto Sans JP', 'Hiragino Sans', sans-serif", background:"#0f172a", color:"#e2e8f0", minHeight:"100vh"}}>
      <div style={{background:"linear-gradient(135deg, #1e293b 0%, #0f172a 100%)", borderBottom:"1px solid #334155", padding:"20px 24px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
          <div>
            <h1 style={{margin:0, fontSize:22, fontWeight:700, color:"#f8fafc", letterSpacing:1}}>🏨 ホテル収益シミュレーター</h1>
            <p style={{margin:"4px 0 0", fontSize:13, color:"#94a3b8"}}>部屋タイプ・需要・価格を設定して年間売上を予測 & ルームミックスを最適化</p>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={exportData} style={{background:"#334155",color:"#e2e8f0",border:"none",borderRadius:6,padding:"6px 14px",fontSize:12,cursor:"pointer"}}>💾 データ保存</button>
            <label style={{background:"#334155",color:"#e2e8f0",borderRadius:6,padding:"6px 14px",fontSize:12,cursor:"pointer",display:"inline-flex",alignItems:"center"}}>
              📂 データ読込<input type="file" accept=".json" onChange={importData} style={{display:"none"}} />
            </label>
          </div>
        </div>
        <div style={{marginTop:12, display:"flex", alignItems:"center", gap:12, flexWrap:"wrap"}}>
          <label style={{fontSize:13, color:"#94a3b8"}}>対象年:</label>
          <select value={year} onChange={e=>setYear(+e.target.value)} style={{background:"#1e293b",color:"#f8fafc",border:"1px solid #475569",borderRadius:6,padding:"4px 8px",fontSize:14}}>
            {[2025,2026,2027,2028,2029,2030,2031,2032,2033,2034,2035].map(y=><option key={y} value={y}>{y}年</option>)}
          </select>
          <div style={{marginLeft:"auto", background:"#1e293b", border:"1px solid #475569", borderRadius:8, padding:"8px 16px"}}>
            <span style={{fontSize:12, color:"#94a3b8"}}>年間売上見込</span>
            <span style={{fontSize:20, fontWeight:700, color:"#22c55e", marginLeft:12}}>{fmtYen(annualRevenue)}</span>
          </div>
        </div>
      </div>

      <div style={{display:"flex", borderBottom:"1px solid #334155", background:"#1e293b", overflowX:"auto"}}>
        {TABS.map((t,i) => (
          <button key={i} onClick={()=>setTab(i)}
            style={{padding:"12px 20px", fontSize:13, fontWeight:tab===i?700:400, color:tab===i?"#22c55e":"#94a3b8",
              background:"transparent", border:"none", borderBottom:tab===i?"2px solid #22c55e":"2px solid transparent",
              cursor:"pointer", whiteSpace:"nowrap", transition:"all 0.2s"}}>
            {t}
          </button>
        ))}
      </div>

      <div style={{padding:"20px 24px", maxWidth:1400, margin:"0 auto"}}>
        {tab === 0 && <MasterSettings roomTypes={roomTypes} setRoomTypes={setRoomTypes} totalArea={totalArea} setTotalArea={setTotalArea} />}
        {tab === 1 && <DemandCalendar days={days} roomTypes={roomTypes} demandMap={demandMap} setDemand={setDemand} setMonthDemand={setMonthDemand} />}
        {tab === 2 && <RevenueSimulation days={days} roomTypes={roomTypes} dailyRevenue={dailyRevenue} monthlyRevenue={monthlyRevenue} annualRevenue={annualRevenue} />}
        {tab === 3 && <RoomMixOptimizer roomTypes={roomTypes} setRoomTypes={setRoomTypes} totalArea={totalArea} days={days} demandMap={demandMap} />}
      </div>

      <div style={{textAlign:"center",padding:"20px",fontSize:11,color:"#475569",borderTop:"1px solid #1e293b"}}>
        © Hotel Revenue Simulator — ブラウザ上で完結・データはローカルに保存
      </div>
    </div>
  );
}

// ── Master Settings ──
function MasterSettings({ roomTypes, setRoomTypes, totalArea, setTotalArea }) {
  const updateRT = (idx, field, val) => {
    setRoomTypes(prev => prev.map((rt, i) => i === idx ? { ...rt, [field]: val } : rt));
  };
  const updatePrice = (idx, demand, val) => {
    setRoomTypes(prev => prev.map((rt, i) => i === idx ? { ...rt, prices: { ...rt.prices, [demand]: +val } } : rt));
  };
  const updateOcc = (idx, demand, val) => {
    setRoomTypes(prev => prev.map((rt, i) => i === idx ? { ...rt, occ: { ...rt.occ, [demand]: +val } } : rt));
  };
  const addRT = () => {
    const id = "type_" + Date.now();
    setRoomTypes(prev => [...prev, { id, name: "新規タイプ", area: 20, prices:{5:15000,4:12000,3:9000,2:7000,1:5000}, occ:{5:90,4:80,3:65,2:45,1:25}, rooms:10 }]);
  };
  const removeRT = (idx) => setRoomTypes(prev => prev.filter((_, i) => i !== idx));
  const usedArea = roomTypes.reduce((s, rt) => s + rt.area * rt.rooms, 0);
  const inputStyle = {background:"#0f172a",color:"#f8fafc",border:"1px solid #475569",borderRadius:4,padding:"4px 6px",fontSize:13,width:70,textAlign:"right"};
  const labelStyle = {fontSize:11,color:"#94a3b8",display:"block",marginBottom:2};

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:20,flexWrap:"wrap"}}>
        <div>
          <span style={labelStyle}>総客室面積 (㎡)</span>
          <input type="number" value={totalArea} onChange={e=>setTotalArea(+e.target.value)} style={{...inputStyle,width:100}} />
        </div>
        <div style={{background:usedArea>totalArea?"#7f1d1d":"#14532d",padding:"8px 16px",borderRadius:8}}>
          <span style={{fontSize:12,color:"#94a3b8"}}>使用面積</span>
          <span style={{fontSize:16,fontWeight:700,color:usedArea>totalArea?"#fca5a5":"#86efac",marginLeft:8}}>{fmt(usedArea)} ㎡ / {fmt(totalArea)} ㎡</span>
        </div>
        <button onClick={addRT} style={{background:"#22c55e",color:"#0f172a",border:"none",borderRadius:6,padding:"8px 16px",fontSize:13,fontWeight:700,cursor:"pointer"}}>＋ 部屋タイプ追加</button>
      </div>
      {roomTypes.map((rt, idx) => (
        <div key={rt.id} style={{background:"#1e293b",border:"1px solid #334155",borderRadius:10,padding:16,marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12,flexWrap:"wrap"}}>
            <input value={rt.name} onChange={e=>updateRT(idx,"name",e.target.value)} style={{...inputStyle,width:140,fontSize:15,fontWeight:700}} />
            <div><span style={labelStyle}>面積(㎡)</span><input type="number" value={rt.area} onChange={e=>updateRT(idx,"area",+e.target.value)} style={inputStyle} /></div>
            <div><span style={labelStyle}>室数</span><input type="number" value={rt.rooms} onChange={e=>updateRT(idx,"rooms",+e.target.value)} style={inputStyle} /></div>
            <span style={{fontSize:12,color:"#64748b"}}>小計: {fmt(rt.area * rt.rooms)}㎡</span>
            {roomTypes.length > 1 && <button onClick={()=>removeRT(idx)} style={{marginLeft:"auto",background:"#7f1d1d",color:"#fca5a5",border:"none",borderRadius:4,padding:"4px 10px",fontSize:12,cursor:"pointer"}}>削除</button>}
          </div>
          <div style={{overflowX:"auto"}}>
            <table style={{borderCollapse:"collapse",width:"100%",fontSize:13}}>
              <thead>
                <tr style={{borderBottom:"1px solid #334155"}}>
                  <th style={{textAlign:"left",padding:"6px 8px",color:"#94a3b8",fontWeight:400}}>需要レベル</th>
                  {[5,4,3,2,1].map(d=>(
                    <th key={d} style={{padding:"6px 8px",textAlign:"center"}}>
                      <span style={{display:"inline-block",width:10,height:10,borderRadius:"50%",background:DEMAND_COLORS[d],marginRight:4}} />
                      {d} ({DEMAND_LABELS[d]})
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td style={{padding:"6px 8px",color:"#cbd5e1"}}>単価 (円)</td>
                  {[5,4,3,2,1].map(d=>(
                    <td key={d} style={{padding:"6px 8px",textAlign:"center"}}>
                      <input type="number" value={rt.prices[d]} onChange={e=>updatePrice(idx,d,e.target.value)} style={{...inputStyle,width:80}} />
                    </td>
                  ))}
                </tr>
                <tr>
                  <td style={{padding:"6px 8px",color:"#cbd5e1"}}>稼働率 (%)</td>
                  {[5,4,3,2,1].map(d=>(
                    <td key={d} style={{padding:"6px 8px",textAlign:"center"}}>
                      <input type="number" value={rt.occ[d]} onChange={e=>updateOcc(idx,d,e.target.value)} style={{...inputStyle,width:60}} min={0} max={100} />
                    </td>
                  ))}
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── Demand Calendar ──
function DemandCalendar({ days, roomTypes, demandMap, setDemand, setMonthDemand }) {
  const [selectedRT, setSelectedRT] = useState(roomTypes[0]?.id || "");
  const [bulkMonth, setBulkMonth] = useState(1);
  const [bulkVal, setBulkVal] = useState(3);
  const [paintMode, setPaintMode] = useState(false);
  const [paintVal, setPaintVal] = useState(3);
  const months = Array.from({length:12},(_,i)=>i+1);

  return (
    <div>
      <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        <label style={{fontSize:13,color:"#94a3b8"}}>部屋タイプ:</label>
        <select value={selectedRT} onChange={e=>setSelectedRT(e.target.value)} style={{background:"#1e293b",color:"#f8fafc",border:"1px solid #475569",borderRadius:6,padding:"4px 8px",fontSize:13}}>
          {roomTypes.map(rt=><option key={rt.id} value={rt.id}>{rt.name}</option>)}
        </select>
        <div style={{marginLeft:16,display:"flex",gap:8,alignItems:"center"}}>
          <label style={{fontSize:13,color:"#94a3b8"}}>一括設定:</label>
          <select value={bulkMonth} onChange={e=>setBulkMonth(+e.target.value)} style={{background:"#1e293b",color:"#f8fafc",border:"1px solid #475569",borderRadius:6,padding:"4px 8px",fontSize:13}}>
            {months.map(m=><option key={m} value={m}>{m}月</option>)}
          </select>
          <select value={bulkVal} onChange={e=>setBulkVal(+e.target.value)} style={{background:"#1e293b",color:"#f8fafc",border:"1px solid #475569",borderRadius:6,padding:"4px 8px",fontSize:13}}>
            {[5,4,3,2,1,0].map(v=><option key={v} value={v}>{v} ({DEMAND_LABELS[v]})</option>)}
          </select>
          <button onClick={()=>setMonthDemand(bulkMonth,selectedRT,bulkVal)} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:6,padding:"6px 14px",fontSize:13,cursor:"pointer",fontWeight:600}}>適用</button>
        </div>
        <div style={{marginLeft:16,display:"flex",gap:8,alignItems:"center"}}>
          <label style={{fontSize:12,color:"#94a3b8"}}>ペイントモード:</label>
          <button onClick={()=>setPaintMode(!paintMode)} style={{background:paintMode?"#22c55e":"#475569",color:"#fff",border:"none",borderRadius:6,padding:"4px 12px",fontSize:12,cursor:"pointer"}}>{paintMode?"ON":"OFF"}</button>
          {paintMode && <select value={paintVal} onChange={e=>setPaintVal(+e.target.value)} style={{background:"#1e293b",color:"#f8fafc",border:"1px solid #475569",borderRadius:6,padding:"4px 6px",fontSize:12}}>
            {[5,4,3,2,1,0].map(v=><option key={v} value={v}>{v}</option>)}
          </select>}
        </div>
      </div>
      <div style={{display:"flex",gap:12,marginBottom:12,flexWrap:"wrap"}}>
        {[5,4,3,2,1,0].map(v=>(
          <div key={v} style={{display:"flex",alignItems:"center",gap:4}}>
            <div style={{width:14,height:14,borderRadius:3,background:DEMAND_COLORS[v]}} />
            <span style={{fontSize:11,color:"#94a3b8"}}>{v}: {DEMAND_LABELS[v]}</span>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(300px, 1fr))",gap:12}}>
        {months.map(month => {
          const monthDays = days.filter(d => d.month === month);
          const firstDow = monthDays[0]?.dow || 0;
          return (
            <div key={month} style={{background:"#1e293b",border:"1px solid #334155",borderRadius:8,padding:12}}>
              <h3 style={{margin:"0 0 8px",fontSize:14,fontWeight:600,color:"#f8fafc"}}>{month}月</h3>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7, 1fr)",gap:2,fontSize:10}}>
                {["日","月","火","水","木","金","土"].map(d=><div key={d} style={{textAlign:"center",color:"#64748b",padding:2}}>{d}</div>)}
                {Array.from({length:firstDow}).map((_,i)=><div key={"e"+i} />)}
                {monthDays.map(day => {
                  const demand = demandMap[day.index]?.[selectedRT] ?? 2;
                  return (
                    <div key={day.index}
                      onClick={()=>{
                        if(paintMode) setDemand(day.index, selectedRT, paintVal);
                        else setDemand(day.index, selectedRT, demand === 0 ? 5 : demand - 1);
                      }}
                      onMouseEnter={(e)=>{ if(paintMode && e.buttons===1) setDemand(day.index, selectedRT, paintVal); }}
                      style={{
                        background: DEMAND_COLORS[demand], color: demand===0?"#475569":"#fff",
                        textAlign:"center", padding:"4px 0", borderRadius:3, cursor:"pointer",
                        fontWeight: day.isHoliday||day.isSun||day.isSat ? 700 : 400,
                        opacity: demand === 0 ? 0.5 : 1,
                        border: day.isHoliday ? "1px solid #fbbf24" : "1px solid transparent",
                        userSelect:"none"
                      }}
                      title={`${day.label}(${day.dowLabel}) 需要:${demand}${day.isHoliday?" 祝日":""}`}
                    >
                      {day.day}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Revenue Simulation ──
function RevenueSimulation({ days, roomTypes, dailyRevenue, monthlyRevenue, annualRevenue }) {
  const [viewMode, setViewMode] = useState("monthly");
  const [selectedMonth, setSelectedMonth] = useState(1);
  const maxMonthly = Math.max(...monthlyRevenue);
  const rtRevenue = useMemo(() => {
    const totals = {};
    roomTypes.forEach(rt => { totals[rt.id] = 0; });
    dailyRevenue.forEach(d => { roomTypes.forEach(rt => { totals[rt.id] += d.details[rt.id]?.revenue || 0; }); });
    return totals;
  }, [dailyRevenue, roomTypes]);

  const avgOcc = useMemo(() => {
    const totalSold = dailyRevenue.reduce((s,d) => s + d.soldRoomsAll, 0);
    const totalAvail = dailyRevenue.reduce((s,d) => s + d.totalRoomsAll, 0);
    return totalAvail > 0 ? (totalSold / totalAvail) * 100 : 0;
  }, [dailyRevenue]);
  const avgAdr = useMemo(() => {
    const totalSold = dailyRevenue.reduce((s,d) => s + d.soldRoomsAll, 0);
    return totalSold > 0 ? annualRevenue / totalSold : 0;
  }, [dailyRevenue, annualRevenue]);
  const avgRevpar = useMemo(() => {
    const totalAvail = dailyRevenue.reduce((s,d) => s + d.totalRoomsAll, 0);
    return totalAvail > 0 ? annualRevenue / totalAvail : 0;
  }, [dailyRevenue, annualRevenue]);

  // CSV export
  const exportCSV = () => {
    const headers = ["日付","曜日",...roomTypes.flatMap(rt=>[`${rt.name}_売上`,`${rt.name}_OCC`,`${rt.name}_ADR`]),"合計","OCC","ADR","RevPAR"];
    const rows = days.map((day,i) => {
      const rev = dailyRevenue[i];
      const revpar = rev.totalRoomsAll > 0 ? rev.total / rev.totalRoomsAll : 0;
      return [day.label, day.dowLabel,
        ...roomTypes.flatMap(rt => {
          const d = rev.details[rt.id];
          return [Math.round(d?.revenue||0), (d?.occ||0).toFixed(1)+"%", Math.round(d?.price||0)];
        }),
        Math.round(rev.total), rev.occAll.toFixed(1)+"%", Math.round(rev.adr), Math.round(revpar)
      ].join(",");
    });
    const csv = "\uFEFF" + headers.join(",") + "\n" + rows.join("\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = `hotel_revenue_${selectedMonth}月.csv`; a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(200px, 1fr))",gap:12,marginBottom:20}}>
        <div style={{background:"linear-gradient(135deg,#14532d,#166534)",borderRadius:10,padding:16}}>
          <div style={{fontSize:12,color:"#86efac"}}>年間売上見込</div>
          <div style={{fontSize:24,fontWeight:800,color:"#f0fdf4",marginTop:4}}>{fmtYen(annualRevenue)}</div>
        </div>
        <div style={{background:"#1e293b",border:"1px solid #854d0e",borderRadius:10,padding:16}}>
          <div style={{fontSize:12,color:"#fbbf24"}}>年間平均 OCC</div>
          <div style={{fontSize:22,fontWeight:800,color:"#fbbf24",marginTop:4}}>{avgOcc.toFixed(1)}%</div>
        </div>
        <div style={{background:"#1e293b",border:"1px solid #6d28d9",borderRadius:10,padding:16}}>
          <div style={{fontSize:12,color:"#a78bfa"}}>年間平均 ADR</div>
          <div style={{fontSize:22,fontWeight:800,color:"#a78bfa",marginTop:4}}>{fmtYen(avgAdr)}</div>
        </div>
        <div style={{background:"#1e293b",border:"1px solid #0369a1",borderRadius:10,padding:16}}>
          <div style={{fontSize:12,color:"#38bdf8"}}>年間平均 RevPAR</div>
          <div style={{fontSize:22,fontWeight:800,color:"#38bdf8",marginTop:4}}>{fmtYen(avgRevpar)}</div>
        </div>
        {roomTypes.map(rt=>(
          <div key={rt.id} style={{background:"#1e293b",border:"1px solid #334155",borderRadius:10,padding:16}}>
            <div style={{fontSize:12,color:"#94a3b8"}}>{rt.name}</div>
            <div style={{fontSize:18,fontWeight:700,color:"#f8fafc",marginTop:4}}>{fmtYen(rtRevenue[rt.id])}</div>
            <div style={{fontSize:11,color:"#64748b"}}>構成比: {((rtRevenue[rt.id]/annualRevenue)*100).toFixed(1)}%</div>
          </div>
        ))}
      </div>

      <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:10,padding:16,marginBottom:20}}>
        <h3 style={{margin:"0 0 12px",fontSize:15,fontWeight:600,color:"#f8fafc"}}>月別売上</h3>
        <div style={{display:"flex",alignItems:"flex-end",gap:8,height:180}}>
          {monthlyRevenue.map((rev,i)=>(
            <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",height:"100%",justifyContent:"flex-end"}}>
              <div style={{fontSize:10,color:"#94a3b8",marginBottom:4}}>{fmtYen(rev)}</div>
              <div style={{width:"100%",background:"linear-gradient(180deg,#22c55e,#15803d)",borderRadius:"4px 4px 0 0",
                height: maxMonthly > 0 ? `${(rev/maxMonthly)*140}px` : 0, minHeight:2, transition:"height 0.3s"}} />
              <div style={{fontSize:11,color:"#94a3b8",marginTop:4}}>{i+1}月</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{display:"flex",gap:12,marginBottom:12,alignItems:"center"}}>
        <button onClick={()=>setViewMode(viewMode==="monthly"?"daily":"monthly")} style={{background:"#334155",color:"#f8fafc",border:"none",borderRadius:6,padding:"6px 14px",fontSize:13,cursor:"pointer"}}>
          {viewMode==="monthly"?"日別詳細を表示":"月別に戻す"}
        </button>
        {viewMode==="daily" && (
          <Fragment>
            <select value={selectedMonth} onChange={e=>setSelectedMonth(+e.target.value)} style={{background:"#1e293b",color:"#f8fafc",border:"1px solid #475569",borderRadius:6,padding:"4px 8px",fontSize:13}}>
              {Array.from({length:12},(_,i)=><option key={i+1} value={i+1}>{i+1}月</option>)}
            </select>
            <button onClick={exportCSV} style={{background:"#334155",color:"#e2e8f0",border:"none",borderRadius:6,padding:"6px 14px",fontSize:12,cursor:"pointer"}}>📊 CSV出力</button>
          </Fragment>
        )}
      </div>
      {viewMode === "daily" && (
        <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:10,padding:16,overflowX:"auto"}}>
          <table style={{borderCollapse:"collapse",width:"100%",fontSize:11}}>
            <thead>
              <tr style={{borderBottom:"1px solid #475569"}}>
                <th rowSpan={2} style={{padding:"6px 8px",textAlign:"left",color:"#94a3b8",position:"sticky",left:0,background:"#1e293b",zIndex:2,borderRight:"1px solid #334155"}}>日付</th>
                <th rowSpan={2} style={{padding:"6px 8px",textAlign:"left",color:"#94a3b8"}}>曜日</th>
                {roomTypes.map(rt=>(
                  <th key={rt.id} colSpan={3} style={{padding:"6px 8px",textAlign:"center",color:"#f8fafc",borderLeft:"1px solid #334155",fontWeight:600}}>{rt.name}</th>
                ))}
                <th colSpan={4} style={{padding:"6px 8px",textAlign:"center",color:"#22c55e",borderLeft:"2px solid #475569",fontWeight:700}}>全体</th>
              </tr>
              <tr style={{borderBottom:"1px solid #334155"}}>
                {roomTypes.map(rt=>(
                  <Fragment key={rt.id}>
                    <th style={{padding:"4px 6px",textAlign:"right",color:"#94a3b8",borderLeft:"1px solid #334155",fontSize:10}}>売上</th>
                    <th style={{padding:"4px 6px",textAlign:"right",color:"#fbbf24",fontSize:10}}>OCC</th>
                    <th style={{padding:"4px 6px",textAlign:"right",color:"#a78bfa",fontSize:10}}>ADR</th>
                  </Fragment>
                ))}
                <th style={{padding:"4px 6px",textAlign:"right",color:"#94a3b8",borderLeft:"2px solid #475569",fontSize:10}}>売上</th>
                <th style={{padding:"4px 6px",textAlign:"right",color:"#fbbf24",fontSize:10}}>OCC</th>
                <th style={{padding:"4px 6px",textAlign:"right",color:"#a78bfa",fontSize:10}}>ADR</th>
                <th style={{padding:"4px 6px",textAlign:"right",color:"#38bdf8",fontSize:10}}>RevPAR</th>
              </tr>
            </thead>
            <tbody>
              {days.filter(d=>d.month===selectedMonth).map(day=>{
                const rev = dailyRevenue[day.index];
                const revpar = rev.totalRoomsAll > 0 ? rev.total / rev.totalRoomsAll : 0;
                const rowBg = day.isHoliday||day.isSun?"#1a1a2e":day.isSat?"#1a2a1a":"transparent";
                const stickyBg = day.isHoliday||day.isSun?"#1a1a2e":day.isSat?"#1a2a1a":"#1e293b";
                return (
                  <tr key={day.index} style={{borderBottom:"1px solid #1e293b",background:rowBg}}>
                    <td style={{padding:"3px 6px",color:"#f8fafc",position:"sticky",left:0,background:stickyBg,zIndex:1,borderRight:"1px solid #334155",whiteSpace:"nowrap"}}>{day.label}</td>
                    <td style={{padding:"3px 6px",color:day.isSun||day.isHoliday?"#f87171":day.isSat?"#60a5fa":"#94a3b8",whiteSpace:"nowrap"}}>{day.dowLabel}{day.isHoliday?" 祝":""}</td>
                    {roomTypes.map(rt=>{
                      const d = rev.details[rt.id];
                      return (
                        <Fragment key={rt.id}>
                          <td style={{padding:"3px 6px",textAlign:"right",color:"#e2e8f0",borderLeft:"1px solid #334155"}}>{fmtYen(d?.revenue||0)}</td>
                          <td style={{padding:"3px 6px",textAlign:"right",color:"#fbbf24"}}>{(d?.occ||0).toFixed(0)}%</td>
                          <td style={{padding:"3px 6px",textAlign:"right",color:"#a78bfa"}}>{fmtYen(d?.price||0)}</td>
                        </Fragment>
                      );
                    })}
                    <td style={{padding:"3px 6px",textAlign:"right",color:"#22c55e",fontWeight:700,borderLeft:"2px solid #475569"}}>{fmtYen(rev.total)}</td>
                    <td style={{padding:"3px 6px",textAlign:"right",color:"#fbbf24",fontWeight:600}}>{rev.occAll.toFixed(1)}%</td>
                    <td style={{padding:"3px 6px",textAlign:"right",color:"#a78bfa",fontWeight:600}}>{fmtYen(rev.adr)}</td>
                    <td style={{padding:"3px 6px",textAlign:"right",color:"#38bdf8",fontWeight:600}}>{fmtYen(revpar)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ── Room Mix Optimizer ──
function RoomMixOptimizer({ roomTypes, setRoomTypes, totalArea, days, demandMap }) {
  const [scenarios, setScenarios] = useState([]);
  const [running, setRunning] = useState(false);
  const [iterations, setIterations] = useState(500);

  const calcRevenue = useCallback((roomConfig) => {
    let total = 0;
    days.forEach(day => {
      roomConfig.forEach(rc => {
        const demand = demandMap[day.index]?.[rc.id] ?? 2;
        if (demand === 0) return;
        const rt = roomTypes.find(r => r.id === rc.id);
        if (!rt) return;
        const price = rt.prices[demand] || 0;
        const occ = (rt.occ[demand] || 0) / 100;
        total += Math.round(rc.rooms * occ * 10) / 10 * price;
      });
    });
    return total;
  }, [days, demandMap, roomTypes]);

  const runOptimization = useCallback(() => {
    setRunning(true);
    setTimeout(() => {
      const results = [];
      for (let i = 0; i < iterations; i++) {
        let remaining = totalArea;
        const config = [];
        const order = [...roomTypes].sort(() => Math.random() - 0.5);
        order.forEach((rt, idx) => {
          if (idx === order.length - 1) {
            const rooms = Math.floor(remaining / rt.area);
            config.push({ id: rt.id, name: rt.name, rooms, area: rt.area });
          } else {
            const maxRooms = Math.floor(remaining / rt.area);
            const rooms = Math.floor(Math.random() * (maxRooms + 1));
            config.push({ id: rt.id, name: rt.name, rooms, area: rt.area });
            remaining -= rooms * rt.area;
          }
        });
        const usedArea = config.reduce((s, c) => s + c.rooms * c.area, 0);
        if (usedArea <= totalArea && config.every(c => c.rooms >= 0)) {
          const revenue = calcRevenue(config);
          const totalRooms = config.reduce((s, c) => s + c.rooms, 0);
          results.push({ config, revenue, usedArea, totalRooms });
        }
      }
      results.sort((a, b) => b.revenue - a.revenue);
      setScenarios(results.slice(0, 20));
      setRunning(false);
    }, 100);
  }, [roomTypes, totalArea, iterations, calcRevenue]);

  const applyScenario = (sc) => {
    const newRoomTypes = roomTypes.map(rt => {
      const c = sc.config.find(c => c.id === rt.id);
      return c ? { ...rt, rooms: c.rooms } : rt;
    });
    setRoomTypes(newRoomTypes);
    alert("マスター設定の室数を更新しました！\n売上シミュレーションタブで結果をご確認ください。");
  };

  const currentRevenue = calcRevenue(roomTypes.map(rt => ({ id: rt.id, rooms: rt.rooms })));

  return (
    <div>
      <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:10,padding:16,marginBottom:20}}>
        <h3 style={{margin:"0 0 8px",fontSize:15,fontWeight:600,color:"#f8fafc"}}>ルームミックス最適化</h3>
        <p style={{fontSize:13,color:"#94a3b8",margin:"0 0 16px"}}>
          総客室面積 {fmt(totalArea)}㎡ の制約内で、需要カレンダーに基づき年間売上を最大化する部屋構成を探索します。
        </p>
        <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
          <div>
            <span style={{fontSize:12,color:"#94a3b8"}}>探索回数:</span>
            <select value={iterations} onChange={e=>setIterations(+e.target.value)} style={{background:"#0f172a",color:"#f8fafc",border:"1px solid #475569",borderRadius:6,padding:"4px 8px",fontSize:13,marginLeft:8}}>
              {[100,500,1000,3000,5000].map(n=><option key={n} value={n}>{fmt(n)}</option>)}
            </select>
          </div>
          <button onClick={runOptimization} disabled={running}
            style={{background:running?"#475569":"#22c55e",color:running?"#94a3b8":"#0f172a",border:"none",borderRadius:6,padding:"10px 24px",fontSize:14,fontWeight:700,cursor:running?"wait":"pointer"}}>
            {running ? "探索中..." : "🔍 最適化を実行"}
          </button>
          <div style={{background:"#14532d",padding:"8px 16px",borderRadius:8}}>
            <span style={{fontSize:12,color:"#86efac"}}>現在の構成での売上:</span>
            <span style={{fontSize:16,fontWeight:700,color:"#f0fdf4",marginLeft:8}}>{fmtYen(currentRevenue)}</span>
          </div>
        </div>
      </div>

      {scenarios.length > 0 && (
        <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:10,padding:16}}>
          <h3 style={{margin:"0 0 12px",fontSize:15,fontWeight:600,color:"#f8fafc"}}>上位シナリオ TOP20</h3>
          <div style={{overflowX:"auto"}}>
            <table style={{borderCollapse:"collapse",width:"100%",fontSize:12}}>
              <thead>
                <tr style={{borderBottom:"1px solid #334155"}}>
                  <th style={{padding:"8px",textAlign:"center",color:"#94a3b8"}}>順位</th>
                  {roomTypes.map(rt=><th key={rt.id} style={{padding:"8px",textAlign:"center",color:"#94a3b8"}}>{rt.name}</th>)}
                  <th style={{padding:"8px",textAlign:"right",color:"#94a3b8"}}>総室数</th>
                  <th style={{padding:"8px",textAlign:"right",color:"#94a3b8"}}>使用面積</th>
                  <th style={{padding:"8px",textAlign:"right",color:"#94a3b8"}}>年間売上</th>
                  <th style={{padding:"8px",textAlign:"right",color:"#94a3b8"}}>現在比</th>
                  <th style={{padding:"8px",textAlign:"center",color:"#94a3b8"}}></th>
                </tr>
              </thead>
              <tbody>
                {scenarios.map((sc,i) => {
                  const diff = sc.revenue - currentRevenue;
                  const pct = currentRevenue > 0 ? (diff / currentRevenue * 100) : 0;
                  return (
                    <tr key={i} style={{borderBottom:"1px solid #1e293b",background:i===0?"#052e16":"transparent"}}>
                      <td style={{padding:"6px 8px",textAlign:"center",color:i===0?"#fbbf24":"#f8fafc",fontWeight:i===0?800:400}}>{i===0?"👑":i+1}</td>
                      {roomTypes.map(rt=>{
                        const c = sc.config.find(c=>c.id===rt.id);
                        return <td key={rt.id} style={{padding:"6px 8px",textAlign:"center",color:"#e2e8f0"}}>{c?.rooms||0}室</td>;
                      })}
                      <td style={{padding:"6px 8px",textAlign:"right",color:"#e2e8f0"}}>{sc.totalRooms}室</td>
                      <td style={{padding:"6px 8px",textAlign:"right",color:"#94a3b8"}}>{fmt(sc.usedArea)}㎡</td>
                      <td style={{padding:"6px 8px",textAlign:"right",color:"#22c55e",fontWeight:700}}>{fmtYen(sc.revenue)}</td>
                      <td style={{padding:"6px 8px",textAlign:"right",color:diff>=0?"#22c55e":"#f87171"}}>{diff>=0?"+":""}{pct.toFixed(1)}%</td>
                      <td style={{padding:"6px 8px",textAlign:"center"}}><button onClick={()=>applyScenario(sc)} style={{background:"#334155",color:"#e2e8f0",border:"none",borderRadius:4,padding:"3px 8px",fontSize:11,cursor:"pointer"}}>適用</button></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
